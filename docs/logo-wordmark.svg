<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 430 96" role="img" aria-label="Switchboard">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a2030"/>
      <stop offset="1" stop-color="#0b0e14"/>
    </linearGradient>
    <linearGradient id="cable" x1="40" y1="30" x2="92" y2="98" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6cb0ff"/>
      <stop offset="1" stop-color="#2f81f7"/>
    </linearGradient>
  </defs>
  <!-- mark -->
  <g transform="translate(8 16) scale(0.5)">
    <rect x="3" y="3" width="122" height="122" rx="29" fill="url(#bg)" stroke="#222a38" stroke-width="2"/>
    <path d="M82 38 C52 30 38 52 64 64 C90 76 76 98 46 90"
          fill="none" stroke="url(#cable)" stroke-width="12" stroke-linecap="round"/>
    <circle cx="82" cy="38" r="11" fill="#0b0e14"/>
    <circle cx="82" cy="38" r="7.5" fill="#2ea043"/>
    <circle cx="46" cy="90" r="11" fill="#0b0e14"/>
    <circle cx="46" cy="90" r="7.5" fill="#3b8eff"/>
  </g>
  <!-- wordmark -->
  <text x="86" y="62" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, Helvetica, Arial, sans-serif"
        font-size="44" font-weight="700" letter-spacing="-0.5">
    <tspan fill="#e6edf3">Switch</tspan><tspan fill="#3b8eff">board</tspan>
  </text>
</svg>
